    "cmake -B${BUILD_DIR}/glslang -H${POMDOG_DIR}/thirdparty/glslang -G \"${CMAKE_GENERATOR}\" -DBUILD_EXTERNAL=OFF -DENABLE_CTEST=OFF -DENABLE_OPT=0 -DCMAKE_BUILD_TYPE=Release",
    "ninja -C ${BUILD_DIR}/glslang",
]
out_file = "${BUILD_DIR}/glslang/StandAlone/glslang"

