[[go_tools]]
build_early_pass = true
go_dir = "${POMDOG_DIR}/tools/cmd"
tools = [
    "flatbuffers-go-modify",
]

[[go_tools]]
go_dir = "${POMDOG_DIR}/tools/cmd"
tools = [
    "bundle-deps",
    "clang-format-all",
    "plain-text-format",
]

[[build_cpp]]
name = "ninja"
platform = ["windows_amd64", "windows_arm64"]
command = [
    "cmake -B${BUILD_DIR}/ninja -H${POMDOG_DIR}/thirdparty/ninja -G \"${CMAKE_GENERATOR}\"",
    "cmake --build ${BUILD_DIR}/ninja --config Release --target ninja",
]
out_file = "${BUILD_DIR}/ninja/Release/ninja${EXE_SUFFIX}"

[[build_cpp]]
name = "ninja"
platform = ["mac_amd64", "mac_arm64"]
command = [
    "cmake -B${BUILD_DIR}/ninja -H${POMDOG_DIR}/thirdparty/ninja -G \"${CMAKE_GENERATOR}\"",
    "xcodebuild -project ${BUILD_DIR}/ninja/ninja.xcodeproj -configuration Release -target ninja",
]
out_file = "${BUILD_DIR}/ninja/Release/ninja"

[[build_cpp]]
name = "ninja"
platform = ["linux_amd64", "linux_arm64"]
command = [
    "cmake -B${BUILD_DIR}/ninja -H${POMDOG_DIR}/thirdparty/ninja -G \"${CMAKE_GENERATOR}\" -DCMAKE_BUILD_TYPE=Release",
    "ninja -C ${BUILD_DIR}/ninja",
]
out_file = "${BUILD_DIR}/ninja/ninja"

[[build_cpp]]
name = "spirv-cross"
platform = ["windows_amd64", "windows_arm64"]
command = [
    "cmake -B${BUILD_DIR}/spirv-cross -H${POMDOG_DIR}/thirdparty/spirv-cross -G \"${CMAKE_GENERATOR}\" -DSPIRV_CROSS_ENABLE_TESTS=OFF",
    "cmake --build ${BUILD_DIR}/spirv-cross --config Release --target spirv-cross",
]
out_file = "${BUILD_DIR}/spirv-cross/Release/spirv-cross${EXE_SUFFIX}"

