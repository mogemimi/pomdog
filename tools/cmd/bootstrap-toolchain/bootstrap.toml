[[build_cpp]]
name = "glslang"
platform = ["windows_amd64", "windows_arm64"]
command = [
    "cmake -B${BUILD_DIR}/glslang -H${POMDOG_DIR}/thirdparty/glslang -G \"${CMAKE_GENERATOR}\" -DBUILD_EXTERNAL=OFF -DENABLE_CTEST=OFF -DENABLE_OPT=0 -DPython3_EXECUTABLE=${TOOLS_DIR}/python/python.exe",
    "cmake --build ${BUILD_DIR}/glslang --config Release --target glslang-standalone",
]
out_file = "${BUILD_DIR}/glslang/StandAlone/Release/glslang${EXE_SUFFIX}"

[[build_cpp]]
name = "glslang"
platform = ["mac_amd64", "mac_arm64"]
