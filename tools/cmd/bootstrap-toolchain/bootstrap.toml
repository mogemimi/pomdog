name = "flatc"
platform = ["mac_amd64", "mac_arm64"]
command = [
    "cmake -B${BUILD_DIR}/flatbuffers -H${POMDOG_DIR}/thirdparty/flatbuffers -G \"${CMAKE_GENERATOR}\" -DFLATBUFFERS_BUILD_TESTS=OFF",
