out_file = "${BUILD_DIR}/flatbuffers/Release/flatc"

[[build_cpp]]
name = "flatc"
platform = ["linux_amd64", "linux_arm64"]
command = [
    "cmake -B${BUILD_DIR}/flatbuffers -H${POMDOG_DIR}/thirdparty/flatbuffers -G \"${CMAKE_GENERATOR}\" -DFLATBUFFERS_BUILD_TESTS=OFF -DCMAKE_BUILD_TYPE=Release",
    "ninja -C ${BUILD_DIR}/flatbuffers",
]
out_file = "${BUILD_DIR}/flatbuffers/flatc"

