[[schemas]]
cpp_dir = "${POMDOG_BUILD_DIR}/schemas-cpp/pomdogschemas"
go_dir = "${POMDOG_BUILD_DIR}/schemas-go"
go_mod_dir = "${POMDOG_BUILD_DIR}/schemas-go/pomdogschemas"
sources = [
    "${POMDOG_DIR}/schemas/archive_debug.fbs",
    "${POMDOG_DIR}/schemas/archive.fbs",
    "${POMDOG_DIR}/schemas/game_controller_db_debug.fbs",
    "${POMDOG_DIR}/schemas/game_controller_db.fbs",
    "${POMDOG_DIR}/schemas/shader_reflect_debug.fbs",
    "${POMDOG_DIR}/schemas/shader_reflect.fbs",
]

[[go_tools]]
build_early_pass = true
go_dir = "${POMDOG_DIR}/tools/cmd"
tools = [
    "flatbuffers-go-modify",
]

[[go_tools]]
go_dir = "${POMDOG_DIR}/tools/cmd"
tools = [
    "archive-content",
    "archive-inspect",
    "archive-ninja-gen",
    "asset-convert-ninja-gen",
    "bundle-deps",
    "clang-format-all",
    "copy-ninja-gen",
    "fxc-wrapper",
    "generate-game-controller-db",
    "glsl-minifier",
    "glsl-rename-combined-samplers",
    "plain-text-format",
    "quickstart",
    "shader-archive-gen",
    "shader-ninja-gen",
    "spirv-link-validate",
    "spirv-patch-interface",
    "spirv-rename-blocks",
    "spirv-shader-reflect",
    "spirv-strip-debug",
    "subninja-gen",
    "wav-crossfade-conv",
]

[[build_cpp]]
name = "ninja"
platform = ["windows_amd64", "windows_arm64"]
command = [
    "cmake -B${BUILD_DIR}/ninja -H${POMDOG_DIR}/thirdparty/ninja -G \"${CMAKE_GENERATOR}\"",
    "cmake --build ${BUILD_DIR}/ninja --config Release --target ninja",
]
out_file = "${BUILD_DIR}/ninja/Release/ninja${EXE_SUFFIX}"

[[build_cpp]]
name = "ninja"
platform = ["mac_amd64", "mac_arm64"]
command = [
    "cmake -B${BUILD_DIR}/ninja -H${POMDOG_DIR}/thirdparty/ninja -G \"${CMAKE_GENERATOR}\"",
    "xcodebuild -project ${BUILD_DIR}/ninja/ninja.xcodeproj -configuration Release -target ninja",
]
out_file = "${BUILD_DIR}/ninja/Release/ninja"

[[build_cpp]]
name = "ninja"
platform = ["linux_amd64", "linux_arm64"]
command = [
    "cmake -B${BUILD_DIR}/ninja -H${POMDOG_DIR}/thirdparty/ninja -G \"${CMAKE_GENERATOR}\" -DCMAKE_BUILD_TYPE=Release",
    "ninja -C ${BUILD_DIR}/ninja",
]
out_file = "${BUILD_DIR}/ninja/ninja"

[[build_cpp]]
name = "spirv-cross"
platform = ["windows_amd64", "windows_arm64"]
command = [
    "cmake -B${BUILD_DIR}/spirv-cross -H${POMDOG_DIR}/thirdparty/spirv-cross -G \"${CMAKE_GENERATOR}\" -DSPIRV_CROSS_ENABLE_TESTS=OFF",
    "cmake --build ${BUILD_DIR}/spirv-cross --config Release --target spirv-cross",
]
out_file = "${BUILD_DIR}/spirv-cross/Release/spirv-cross${EXE_SUFFIX}"

[[build_cpp]]
name = "spirv-cross"
platform = ["mac_amd64", "mac_arm64"]
command = [
    "cmake -B${BUILD_DIR}/spirv-cross -H${POMDOG_DIR}/thirdparty/spirv-cross -G \"${CMAKE_GENERATOR}\" -DSPIRV_CROSS_ENABLE_TESTS=OFF",
    "xcodebuild -project ${BUILD_DIR}/spirv-cross/SPIRV-Cross.xcodeproj -configuration Release -target spirv-cross",
]
out_file = "${BUILD_DIR}/spirv-cross/Release/spirv-cross"

[[build_cpp]]
name = "spirv-cross"
platform = ["linux_amd64", "linux_arm64"]
command = [
    "cmake -B${BUILD_DIR}/spirv-cross -H${POMDOG_DIR}/thirdparty/spirv-cross -G \"${CMAKE_GENERATOR}\" -DSPIRV_CROSS_ENABLE_TESTS=OFF -DCMAKE_BUILD_TYPE=Release",
    "ninja -C ${BUILD_DIR}/spirv-cross",
]
out_file = "${BUILD_DIR}/spirv-cross/spirv-cross"

[[build_cpp]]
name = "flatc"
command = [
    "cmake -B${BUILD_DIR}/flatbuffers -H${POMDOG_DIR}/thirdparty/flatbuffers -G \"${CMAKE_GENERATOR}\" -DFLATBUFFERS_BUILD_TESTS=OFF",
    "cmake --build ${BUILD_DIR}/flatbuffers --config Release --target flatc",
]
platform = ["windows_amd64", "windows_arm64"]
out_file = "${BUILD_DIR}/flatbuffers/Release/flatc${EXE_SUFFIX}"

