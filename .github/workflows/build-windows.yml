name: "Build on Windows"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-2025] # [windows-latest, windows-2022]
        build_config: [Debug, Release]
        build_targets:
          - cmake_flags: ""
          - cmake_flags: -DPOMDOG_USE_ADDRESS_SANITIZER=1
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repositry
        uses: actions/checkout@v2
        with:
          submodules: 'recursive'
          fetch-depth: 50
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Cache bootstrap tools
        id: cache-bootstrap
        uses: actions/cache@v5
        with:
          path: build/tools
          key: bootstrap-tools-${{ runner.os }}-${{ hashFiles('tools/cmd/bootstrap-toolchain/bootstrap.toml', 'thirdparty/ninja/**', 'thirdparty/spirv-cross/**', 'thirdparty/flatbuffers/**') }}
      - name: Bootstrap toolchain
        run: |
          ROOT_DIR="$PWD"
          cd $ROOT_DIR/tools/cmd/bootstrap-toolchain
          go build -o $ROOT_DIR/build/tools/bootstrap-toolchain
          cd $ROOT_DIR
          ./build/tools/bootstrap-toolchain \
              --pomdogdir $ROOT_DIR \
              --builddir $ROOT_DIR/build \
              --appdir $ROOT_DIR \
              --cmake-generator "Visual Studio 17" \
              $ROOT_DIR/tools/cmd/bootstrap-toolchain/bootstrap.toml
      - name: Generate Visual Studio projects
        run: cmake -Bbuild/windows -H. -G "Visual Studio 17" ${{ matrix.build_targets.cmake_flags }}
      - name: Build
        run: cmake --build build/windows --config ${{ matrix.build_config }}
      - name: Run test
        run: ./build/windows/tests/${{ matrix.build_config }}/pomdog_tests

  quickstart-test:
    runs-on: windows-2025
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v2
        with:
          submodules: 'recursive'
          fetch-depth: 50
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Cache bootstrap tools
        id: cache-bootstrap
        uses: actions/cache@v5
        with:
          path: build/tools
          key: bootstrap-tools-${{ runner.os }}-${{ hashFiles('tools/cmd/bootstrap-toolchain/bootstrap.toml', 'thirdparty/ninja/**', 'thirdparty/spirv-cross/**', 'thirdparty/flatbuffers/**') }}
      - name: Bootstrap toolchain
        run: |
          ROOT_DIR="$PWD"
          cd $ROOT_DIR/tools/cmd/bootstrap-toolchain
          go build -o $ROOT_DIR/build/tools/bootstrap-toolchain
          cd $ROOT_DIR
          ./build/tools/bootstrap-toolchain \
              --pomdogdir $ROOT_DIR \
              --builddir $ROOT_DIR/build \
              --appdir $ROOT_DIR \
              --cmake-generator "Visual Studio 17" \
              $ROOT_DIR/tools/cmd/bootstrap-toolchain/bootstrap.toml
      - name: Create quickstart project
        run: |
          cd tools/cmd/quickstart
          go build -o "$GITHUB_WORKSPACE/build/tools/quickstart"
          cd "$GITHUB_WORKSPACE"
          ./build/tools/quickstart \
              -non-interactive \
              -pomdog . \
              -name test_app \
              -skip-git \
              -o build/temp_quickstart_dev
      - name: Create pomdog link
        shell: cmd
        working-directory: build/temp_quickstart_dev/test_app
        run: mklink /J pomdog %GITHUB_WORKSPACE%
      - name: Setup quickstart project
        run: |
          cd build/temp_quickstart_dev/test_app
          mkdir -p build/tools
          cp -r "$GITHUB_WORKSPACE/build/tools/"* build/tools/
      - name: Asset build (quickstart)
        run: |
          cd build/temp_quickstart_dev/test_app
          bash tools/script/assetbuild.sh
      - name: Build quickstart project (Release)
        run: |
          cd build/temp_quickstart_dev/test_app
          cmake -Bbuild/windows -H. -G "Visual Studio 17"
          cmake --build build/windows --config Release
      - name: Package (Windows)
        run: |
          cd build/temp_quickstart_dev/test_app
          bash tools/script/package_windows.sh
      - name: Verify shipping package
        run: |
          test -f build/temp_quickstart_dev/test_app/build/test_app/shipping/windows/test_app.exe
          test -f build/temp_quickstart_dev/test_app/build/test_app/shipping/windows/content.idx
          test -f build/temp_quickstart_dev/test_app/build/test_app/shipping/windows/content.pak
